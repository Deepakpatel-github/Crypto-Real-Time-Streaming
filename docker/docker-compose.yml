# version: "3.8"

networks:
  crypto-net:
    driver: bridge

x-flink-env: &flink-env
  CLICKHOUSE_DB: crypto
  CLICKHOUSE_HOST: clickhouse
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-secret}
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
  FLINK_KAFKA_GROUP: flink-market-processor
  FLINK_PARALLELISM: "2"
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  KAFKA_TOPIC: raw_trades

services:

  # ─── Zookeeper (Kafka dependency) ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks: [crypto-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka Broker ──────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks: [crypto-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Kafka UI (Visualize topics/messages) ──────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [crypto-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─── ClickHouse ────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    networks: [crypto-net]
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: crypto
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-admin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-secret}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "admin",
          "--password",
          "secret",
          "--query",
          "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Flink JobManager ──────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    networks: [crypto-net]
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      <<: *flink-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
    volumes:
      - ../flink_jobs:/opt/flink/jobs

  # ─── Flink TaskManager ─────────────────────────────────────────
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    networks: [crypto-net]
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      <<: *flink-env
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        taskmanager.memory.process.size: 2048m
    volumes:
      - ../flink_jobs:/opt/flink/jobs

  # ─── Flink Job Submitter (one-shot) ────────────────────────────
  flink-job-submitter:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-job-submitter
    networks: [crypto-net]
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      <<: *flink-env
      FLINK_JOBMANAGER_HOST: flink-jobmanager
      FLINK_JOBMANAGER_PORT: "8081"
      KAFKA_HOST: kafka
      KAFKA_PORT: "29092"
      MAX_WAIT_SECONDS: "180"
    volumes:
      - ../flink_jobs:/opt/flink/jobs
    entrypoint: ["/bin/bash", "/opt/flink/jobs/submit_job.sh"]
    restart: "no"

  # ─── Binance WebSocket Producer ────────────────────────────────
  producer:
    build:
      context: ../producer
      dockerfile: Dockerfile
    container_name: crypto-producer
    networks: [crypto-net]
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      BINANCE_WS_URL: wss://stream.binance.com:9443/stream
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw_trades
      LOG_LEVEL: INFO
    restart: unless-stopped
